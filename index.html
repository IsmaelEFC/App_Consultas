<!-- index.html -->
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="SIOC OSINT - Plataforma de consultas de interés en fuentes abiertas para vehículos, personas y otros servicios." />
  <!-- Security: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:;">
  <title>SIOC OSINT</title>
  <!-- PWA: Manifest y Theme Color -->
  <link rel="manifest" href="manifest.json" />
  <!-- PWA: Configuración básica -->
  <meta name="theme-color" content="#6366f1" />
  <meta name="application-name" content="SIOC OSINT" />
  <meta name="apple-mobile-web-app-title" content="SIOC OSINT" />
  <meta name="msapplication-TileColor" content="#f8f9fa" />
  
  <!-- PWA: Configuración para iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  
  <!-- PWA: Iconos -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon">
  
  <!-- Performance: Carga asíncrona de CSS -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
</head>

<body>
  <!-- Encabezado Principal -->
  <header role="banner">
    <div class="header-content">
      <div class="logo">
        <i class="fa-solid fa-shield-halved"></i>
        <h1>SIOC OSINT - OS9 Araucanía</h1>
      </div>
      <div class="header-actions">
        <button id="install-button" class="install-button hidden" aria-label="Instalar aplicación">
          <i class="fa-solid fa-download"></i>
          <span>Instalar App</span>
        </button>
      </div>
    </div>
  </header>

  <div class="app-container">
    <!-- Sidebar con Buscador y Navegación (PC) -->
    <aside class="sidebar">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="Buscar consulta..." aria-label="Buscar en las consultas">
        <button id="clear-search" class="clear-search hidden" aria-label="Limpiar búsqueda">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <nav role="navigation" aria-label="Navegación principal">
        <div class="nav-buttons">
          <button class="nav-button active" data-section="vehiculos" aria-label="Ir a sección de vehículos" aria-current="page">
            <i class="fa-solid fa-car" aria-hidden="true"></i>
            <span>Vehículos</span>
          </button>
          <button class="nav-button" data-section="personas" aria-label="Ir a sección de personas">
            <i class="fa-solid fa-address-card" aria-hidden="true"></i>
            <span>Personas</span>
          </button>
          <button class="nav-button" data-section="otros" aria-label="Ir a sección de otros servicios">
            <i class="fa-solid fa-clipboard-list" aria-hidden="true"></i>
            <span>Otros Servicios</span>
          </button>
        </div>
      </nav>
    </aside>

    <!-- Área de Contenido Principal -->
    <main role="main">
      <section id="vehiculos" class="section active" aria-label="Consultas de vehículos">
        <div class="cards-grid" role="list">
          <!-- Cards dinámicas -->
        </div>
      </section>

      <section id="personas" class="section" aria-label="Consultas de personas">
        <div class="cards-grid" role="list">
          <!-- Cards dinámicas -->
        </div>
      </section>

      <section id="otros" class="section" aria-label="Otros servicios de consulta">
        <div class="cards-grid" role="list">
          <!-- Cards dinámicas -->
        </div>
      </section>
    </main>
  </div>

  <div id="rut-dv-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="rut-dv-title">
    <div class="modal-backdrop" data-modal-close="rut-dv"></div>
    <div class="modal-panel" role="document">
      <div class="modal-header">
        <h2 id="rut-dv-title">Dígito Verificador RUT</h2>
        <button class="icon-button" type="button" aria-label="Cerrar" data-modal-close="rut-dv">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
      <div class="modal-body">
        <label class="field-label" for="rut-dv-input">RUT sin dígito verificador</label>
        <input id="rut-dv-input" class="field-input" inputmode="numeric" autocomplete="off" placeholder="Ej: 12345678">
        <div class="modal-actions">
          <button id="rut-dv-calc" class="primary-button" type="button">Calcular</button>
          <button id="rut-dv-clear" class="secondary-button" type="button">Limpiar</button>
        </div>
        <div id="rut-dv-result" class="result-box hidden" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <footer role="contentinfo">
    <p>&copy; 2025-2026 SIOC OSINT - Inteligencia de Fuentes Abiertas - OS9 Araucanía</p>
  </footer>

  <script src="script.js" defer></script>
</body>

</html>
